<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Arju</title>
  <style>
    :root {
      --bg: #201915;
      --bg-soft: #43352d;
      --card: rgba(35, 28, 24, 0.82);
      --line: rgba(239, 193, 132, 0.2);
      --accent: #efc184;
      --accent-strong: #ffe9c8;
      --accent-warm: #dc9760;
      --text: #f8eee0;
      --muted: #c8b7a2;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      --radius: 28px;
      --max: 1120px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background:
        radial-gradient(circle at 14% 8%, rgba(255, 208, 142, 0.22), transparent 28%),
        radial-gradient(circle at 85% 14%, rgba(214, 141, 86, 0.16), transparent 24%),
        linear-gradient(180deg, #2c221d 0%, #1c1714 52%, #120f0d 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 233, 200, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 233, 200, 0.03) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 1));
    }

    img {
      max-width: 100%;
      display: block;
    }

    .page-shell {
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
      padding: 24px 0 60px;
      position: relative;
      z-index: 1;
    }

    .hero {
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: calc(var(--radius) + 6px);
      background:
        linear-gradient(180deg, rgba(42, 31, 25, 0.9), rgba(22, 18, 16, 0.97)),
        linear-gradient(120deg, rgba(239, 193, 132, 0.08), transparent 42%);
      box-shadow:
        0 24px 64px rgba(0, 0, 0, 0.42),
        0 0 0 1px rgba(255, 241, 214, 0.02) inset,
        0 -24px 48px rgba(255, 201, 138, 0.04) inset;
      overflow: hidden;
      position: relative;
      transition: box-shadow 280ms ease, border-color 280ms ease, transform 280ms ease;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(135deg, rgba(255, 236, 205, 0.08), transparent 22%, transparent 72%, rgba(255, 184, 118, 0.04)),
        radial-gradient(circle at 84% 12%, rgba(255, 226, 182, 0.08), transparent 22%);
      opacity: 0.9;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -80px -90px auto;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(239, 193, 132, 0.18), transparent 68%);
      filter: blur(16px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent-strong);
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(206, 187, 150, 0.24);
      background: rgba(201, 177, 138, 0.08);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 28px;
      align-items: center;
      margin-top: 22px;
    }

    .title-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 160px;
      gap: 18px;
      align-items: end;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2.5rem, 6vw, 5rem);
      line-height: 0.9;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      filter: drop-shadow(0 4px 18px rgba(0, 0, 0, 0.22));
    }

    .name-accent {
      display: block;
      color: transparent;
      background: linear-gradient(180deg, #ffe6bd 0%, #efc184 44%, #d79257 100%);
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow:
        0 0 22px rgba(239, 193, 132, 0.22),
        0 8px 18px rgba(87, 48, 22, 0.18);
      filter: drop-shadow(0 0 18px rgba(239, 193, 132, 0.08));
    }

    .hero-photo-card {
      position: relative;
      overflow: hidden;
      align-self: end;
      border-radius: 22px;
      border: 1px solid rgba(239, 193, 132, 0.24);
      background:
        linear-gradient(180deg, rgba(70, 52, 42, 0.78), rgba(26, 21, 18, 0.96));
      box-shadow:
        0 18px 36px rgba(0, 0, 0, 0.28),
        0 2px 0 rgba(255, 235, 203, 0.06) inset,
        inset 0 0 0 1px rgba(255, 255, 255, 0.03);
      aspect-ratio: 4 / 5;
      min-height: 210px;
      transition: transform 260ms ease, box-shadow 260ms ease, border-color 260ms ease;
    }

    .hero-photo-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent 24%, transparent 70%, rgba(0, 0, 0, 0.18)),
        linear-gradient(112deg, transparent 12%, rgba(255, 255, 255, 0.08) 22%, transparent 34%),
        radial-gradient(circle at top right, rgba(239, 193, 132, 0.24), transparent 28%);
      pointer-events: none;
      z-index: 1;
    }

    .hero-photo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 56% center;
      display: block;
    }

    .lead {
      margin: 0;
      max-width: 58ch;
      font-size: 1.02rem;
      line-height: 1.8;
      color: var(--muted);
    }

    .wish-box {
      margin-top: 24px;
      padding: 18px 20px;
      border-left: 4px solid var(--accent-warm);
      background: rgba(255, 240, 219, 0.045);
      border-radius: 0 18px 18px 0;
      box-shadow:
        inset 0 0 0 1px rgba(255, 226, 188, 0.06),
        inset 0 14px 24px rgba(255, 236, 209, 0.02),
        0 14px 28px rgba(0, 0, 0, 0.16);
      transition: transform 240ms ease, box-shadow 240ms ease, border-color 240ms ease;
    }

    .wish-box p {
      margin: 0;
      font-size: 1.06rem;
      line-height: 1.86;
      letter-spacing: 0.008em;
      color: var(--text);
      text-wrap: balance;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 26px;
    }

    .chip {
      padding: 12px 16px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--accent-strong);
      font-size: 0.95rem;
    }

    .scene-card {
      padding: 18px;
      background: rgba(31, 24, 20, 0.68);
      border: 1px solid rgba(239, 193, 132, 0.14);
      border-radius: 26px;
      box-shadow:
        0 18px 44px rgba(0, 0, 0, 0.28),
        0 2px 0 rgba(255, 235, 203, 0.05) inset,
        inset 0 0 0 1px rgba(255, 255, 255, 0.03);
      transition: transform 280ms ease, box-shadow 280ms ease, border-color 280ms ease;
    }

    .scene-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
      font-size: 0.92rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }

    .badge {
      color: #2b2018;
      background: linear-gradient(135deg, #dd925d, #ffd59e);
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      box-shadow:
        0 10px 18px rgba(184, 109, 77, 0.22),
        inset 0 1px 0 rgba(255, 247, 230, 0.42);
      transition: transform 240ms ease, box-shadow 240ms ease;
    }

    .road-scene {
      position: relative;
      min-height: 380px;
      border-radius: 22px;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 226, 176, 0.18), transparent 16%),
        radial-gradient(circle at 78% 20%, rgba(255, 183, 117, 0.16), transparent 15%),
        radial-gradient(circle at 52% 46%, rgba(184, 131, 84, 0.18), transparent 30%),
        linear-gradient(180deg, #f5d5aa 0%, #eab37b 28%, #cf7b55 54%, #5d4f56 70%, #2f2f34 71%, #1c1d22 100%);
      border: 1px solid rgba(255, 245, 229, 0.06);
      box-shadow:
        inset 0 1px 0 rgba(255, 245, 229, 0.18),
        inset 0 -24px 44px rgba(18, 14, 16, 0.18),
        0 20px 44px rgba(0, 0, 0, 0.16);
      animation: sceneDrift 16s ease-in-out infinite alternate;
      will-change: transform;
    }

    .road-scene::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(circle at 12% 30%, rgba(255, 227, 182, 0.18) 0 1.5%, transparent 2.4%),
        radial-gradient(circle at 22% 58%, rgba(255, 211, 150, 0.16) 0 1.7%, transparent 2.8%),
        radial-gradient(circle at 42% 22%, rgba(255, 239, 213, 0.18) 0 1.2%, transparent 2.2%),
        radial-gradient(circle at 56% 48%, rgba(255, 204, 142, 0.14) 0 1.6%, transparent 2.6%),
        radial-gradient(circle at 70% 34%, rgba(255, 232, 196, 0.16) 0 1.3%, transparent 2.3%),
        radial-gradient(circle at 84% 56%, rgba(255, 201, 138, 0.18) 0 1.7%, transparent 2.8%),
        radial-gradient(circle at 92% 26%, rgba(255, 241, 214, 0.14) 0 1.2%, transparent 2.1%);
      mix-blend-mode: screen;
      animation: bokehFloat 14s linear infinite;
    }

    .road-scene::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255, 244, 223, 0.08), transparent 26%, transparent 58%, rgba(45, 38, 42, 0.18) 74%, rgba(28, 26, 30, 0.34) 100%),
        radial-gradient(ellipse at 50% 64%, rgba(255, 213, 153, 0.11), transparent 42%);
      opacity: 0.9;
    }

    .sun {
      position: absolute;
      top: 28px;
      right: 48px;
      width: 88px;
      height: 88px;
      z-index: 1;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 38%, #fff8e4, #ffd79d 54%, rgba(255, 215, 157, 0.28) 70%, transparent 72%);
      box-shadow:
        0 0 34px rgba(255, 195, 122, 0.34),
        0 0 84px rgba(255, 199, 120, 0.14);
      animation: sunPulse 8s ease-in-out infinite;
      will-change: transform, opacity;
    }

    .sky-glow {
      position: absolute;
      inset: 0 0 108px;
      z-index: 0;
      background:
        radial-gradient(circle at 24% 26%, rgba(255, 226, 179, 0.24), transparent 22%),
        radial-gradient(circle at 76% 20%, rgba(255, 187, 124, 0.28), transparent 18%),
        radial-gradient(circle at 56% 42%, rgba(233, 140, 95, 0.2), transparent 26%);
      filter: blur(3px);
      animation: glowShift 12s ease-in-out infinite alternate;
      will-change: transform, opacity;
    }

    .sky-shift {
      position: absolute;
      inset: 0 0 118px;
      z-index: 0;
      background:
        linear-gradient(120deg, rgba(255, 242, 214, 0.08), transparent 28%, transparent 72%, rgba(255, 206, 145, 0.08)),
        radial-gradient(circle at 18% 24%, rgba(255, 232, 196, 0.12), transparent 18%),
        radial-gradient(circle at 70% 18%, rgba(255, 188, 121, 0.12), transparent 18%);
      animation: skyShift 22s cubic-bezier(0.42, 0, 0.22, 1) infinite alternate;
      will-change: transform, opacity;
    }

    .sunset-clouds {
      position: absolute;
      inset: 0 0 118px;
      z-index: 1;
      background:
        radial-gradient(ellipse at 20% 22%, rgba(255, 231, 198, 0.34) 0 12%, transparent 13%),
        radial-gradient(ellipse at 34% 26%, rgba(247, 202, 162, 0.26) 0 10%, transparent 11%),
        radial-gradient(ellipse at 72% 20%, rgba(255, 224, 186, 0.28) 0 13%, transparent 14%),
        radial-gradient(ellipse at 82% 26%, rgba(240, 173, 124, 0.22) 0 10%, transparent 11%);
      opacity: 0.85;
      animation: cloudDrift 18s cubic-bezier(0.42, 0, 0.22, 1) infinite alternate;
      will-change: transform;
    }

    .horizon-glow {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 118px;
      height: 46px;
      z-index: 1;
      background:
        radial-gradient(circle at 24% 54%, rgba(255, 188, 118, 0.26), transparent 24%),
        radial-gradient(circle at 76% 54%, rgba(222, 132, 86, 0.22), transparent 22%),
        linear-gradient(90deg, rgba(228, 150, 95, 0.16), rgba(255, 218, 170, 0.08), rgba(228, 150, 95, 0.16));
      filter: blur(10px);
      opacity: 0.9;
      animation: horizonBreath 9s ease-in-out infinite alternate;
    }

    .distant-hills {
      position: absolute;
      left: -4%;
      right: -4%;
      bottom: 120px;
      height: 74px;
      z-index: 2;
      background: linear-gradient(180deg, rgba(140, 102, 86, 0.3), rgba(41, 33, 35, 0.68));
      clip-path: polygon(0 100%, 0 62%, 12% 72%, 22% 50%, 34% 64%, 46% 42%, 58% 58%, 71% 36%, 84% 60%, 100% 44%, 100% 100%);
      opacity: 0.8;
      animation: hillDrift 22s cubic-bezier(0.42, 0, 0.22, 1) infinite alternate;
      will-change: transform;
    }

    .atmospheric-haze {
      position: absolute;
      inset: 36% 0 104px;
      z-index: 2;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255, 240, 214, 0.05), rgba(255, 219, 164, 0.12) 35%, rgba(93, 79, 84, 0.12) 75%, transparent),
        radial-gradient(ellipse at 24% 42%, rgba(255, 226, 182, 0.12), transparent 34%),
        radial-gradient(ellipse at 76% 48%, rgba(255, 198, 132, 0.08), transparent 32%);
      filter: blur(8px);
      opacity: 0.9;
      animation: hazeDrift 16s ease-in-out infinite alternate;
      will-change: transform, opacity;
    }

    .cityline-far {
      position: absolute;
      left: 0;
      width: 100%;
      bottom: 140px;
      height: 74px;
      z-index: 2;
      opacity: 0.42;
      background:
        linear-gradient(90deg, transparent 0 2%, rgba(112, 91, 84, 0.42) 2% 6%, transparent 6% 8%, rgba(98, 78, 73, 0.46) 8% 12%, transparent 12% 16%, rgba(121, 98, 91, 0.42) 16% 21%, transparent 21% 25%, rgba(94, 74, 72, 0.48) 25% 31%, transparent 31% 34%, rgba(110, 88, 81, 0.44) 34% 40%, transparent 40% 44%, rgba(103, 82, 76, 0.46) 44% 50%, transparent 50% 55%, rgba(120, 98, 90, 0.42) 55% 60%, transparent 60% 66%, rgba(95, 76, 73, 0.48) 66% 72%, transparent 72% 76%, rgba(111, 89, 82, 0.46) 76% 82%, transparent 82% 86%, rgba(98, 78, 73, 0.44) 86% 92%, transparent 92% 100%);
      animation: skylineFarParallax 19s cubic-bezier(0.42, 0, 0.22, 1) infinite alternate;
      will-change: transform;
    }

    .cityline-far::before {
      content: "";
      position: absolute;
      inset: 18px 0 auto;
      height: 24px;
      background:
        radial-gradient(circle, rgba(255, 214, 149, 0.14) 0 22%, transparent 24%) 4% 10px / 44px 12px repeat-x,
        radial-gradient(circle, rgba(224, 141, 92, 0.12) 0 20%, transparent 22%) 16% 18px / 58px 14px repeat-x;
      opacity: 0.5;
      animation: windowFlickerSoft 6.5s steps(3, end) infinite;
    }

    .cityline-back {
      position: absolute;
      left: 0;
      width: 100%;
      bottom: 126px;
      height: 92px;
      z-index: 3;
      background:
        linear-gradient(90deg, transparent 0 3%, rgba(93, 78, 74, 0.58) 3% 7%, transparent 7% 10%, rgba(80, 66, 65, 0.64) 10% 16%, transparent 16% 20%, rgba(105, 86, 82, 0.62) 20% 25%, transparent 25% 31%, rgba(72, 60, 59, 0.68) 31% 39%, transparent 39% 43%, rgba(84, 69, 66, 0.62) 43% 50%, transparent 50% 56%, rgba(91, 74, 71, 0.62) 56% 61%, transparent 61% 66%, rgba(76, 63, 62, 0.66) 66% 72%, transparent 72% 77%, rgba(88, 72, 69, 0.68) 77% 84%, transparent 84% 89%, rgba(71, 58, 57, 0.62) 89% 95%, transparent 95% 100%);
      opacity: 0.7;
      animation: skylineBackParallax 13s cubic-bezier(0.42, 0, 0.22, 1) infinite alternate;
      will-change: transform;
    }

    .cityline-back::before {
      content: "";
      position: absolute;
      inset: 16px 0 auto;
      height: 34px;
      background:
        radial-gradient(circle, rgba(255, 212, 145, 0.26) 0 26%, transparent 28%) 10% 8px / 54px 16px repeat-x,
        radial-gradient(circle, rgba(223, 138, 89, 0.22) 0 24%, transparent 26%) 22% 16px / 62px 18px repeat-x;
      opacity: 0.55;
      animation: windowFlickerSoft 4.8s steps(4, end) infinite;
    }

    .cityline-back::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(104deg, transparent 14%, rgba(255, 234, 203, 0.08) 24%, transparent 34%),
        linear-gradient(98deg, transparent 50%, rgba(255, 216, 160, 0.05) 58%, transparent 66%);
      animation: buildingSweepBack 11s linear infinite;
      mix-blend-mode: screen;
      opacity: 0.55;
    }

    .cityline {
      position: absolute;
      bottom: 120px;
      left: 0;
      width: 100%;
      height: 112px;
      z-index: 4;
      background:
        linear-gradient(90deg, transparent 0 5%, rgba(34, 31, 34, 0.95) 5% 11%, transparent 11% 14%, rgba(41, 37, 39, 0.92) 14% 18%, transparent 18% 22%, rgba(37, 34, 36, 0.94) 22% 30%, transparent 30% 34%, rgba(30, 28, 30, 0.96) 34% 41%, transparent 41% 48%, rgba(32, 30, 32, 0.92) 48% 58%, transparent 58% 62%, rgba(35, 31, 34, 0.92) 62% 68%, transparent 68% 72%, rgba(38, 35, 37, 0.94) 72% 80%, transparent 80% 84%, rgba(34, 31, 33, 0.95) 84% 94%, transparent 94% 100%);
      opacity: 0.95;
      animation: skylineFrontParallax 8s cubic-bezier(0.42, 0, 0.22, 1) infinite alternate;
      will-change: transform;
    }

    .cityline::before {
      content: "";
      position: absolute;
      inset: 18px 0 auto;
      height: 46px;
      background:
        radial-gradient(circle, rgba(255, 205, 132, 0.42) 0 28%, transparent 30%) 5% 10px / 44px 16px repeat-x,
        radial-gradient(circle, rgba(219, 136, 86, 0.3) 0 24%, transparent 27%) 15% 22px / 56px 18px repeat-x;
      opacity: 0.55;
      animation: windowFlicker 3.8s steps(5, end) infinite;
    }

    .cityline::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(104deg, transparent 10%, rgba(255, 237, 205, 0.08) 18%, transparent 28%),
        linear-gradient(98deg, transparent 62%, rgba(255, 202, 136, 0.06) 69%, transparent 76%);
      animation: buildingSweepFront 8.5s linear infinite;
      mix-blend-mode: screen;
      opacity: 0.6;
    }

    .building-detail {
      position: absolute;
      pointer-events: none;
    }

    .building-detail.mid {
      left: 0;
      right: 0;
      bottom: 122px;
      height: 110px;
      z-index: 4;
      background:
        linear-gradient(90deg, transparent 2%, rgba(255, 229, 192, 0.05) 2.4% 2.6%, transparent 3%, transparent 7%, rgba(255, 229, 192, 0.04) 7.4% 7.6%, transparent 8%, transparent 14%, rgba(255, 229, 192, 0.05) 14.4% 14.6%, transparent 15%, transparent 21%, rgba(255, 229, 192, 0.04) 21.4% 21.6%, transparent 22%, transparent 31%, rgba(255, 229, 192, 0.05) 31.4% 31.6%, transparent 32%, transparent 39%, rgba(255, 229, 192, 0.04) 39.4% 39.6%, transparent 40%, transparent 47%, rgba(255, 229, 192, 0.05) 47.4% 47.6%, transparent 48%, transparent 56%, rgba(255, 229, 192, 0.04) 56.4% 56.6%, transparent 57%, transparent 67%, rgba(255, 229, 192, 0.05) 67.4% 67.6%, transparent 68%, transparent 76%, rgba(255, 229, 192, 0.04) 76.4% 76.6%, transparent 77%, transparent 86%, rgba(255, 229, 192, 0.05) 86.4% 86.6%, transparent 87%, transparent 100%);
      opacity: 0.34;
      animation: skylineFrontParallax 8s cubic-bezier(0.42, 0, 0.22, 1) infinite alternate;
    }

    .building-detail.near {
      left: 0;
      right: 0;
      bottom: 122px;
      height: 112px;
      z-index: 5;
      background:
        radial-gradient(circle, rgba(255, 212, 145, 0.18) 0 22%, transparent 24%) 7% 24px / 54px 20px repeat-x,
        radial-gradient(circle, rgba(223, 138, 89, 0.14) 0 18%, transparent 20%) 18% 42px / 68px 24px repeat-x;
      opacity: 0.26;
      animation: skylineFrontParallax 8s cubic-bezier(0.42, 0, 0.22, 1) infinite alternate, windowFlicker 4.2s steps(4, end) infinite;
    }

    .light-streaks {
      position: absolute;
      inset: 0 0 118px;
      z-index: 5;
      pointer-events: none;
      background:
        linear-gradient(104deg, transparent 6%, rgba(255, 241, 215, 0.04) 12%, transparent 18%),
        linear-gradient(104deg, transparent 42%, rgba(255, 209, 150, 0.04) 48%, transparent 54%),
        linear-gradient(104deg, transparent 78%, rgba(255, 231, 194, 0.04) 84%, transparent 90%);
      opacity: 0.45;
      animation: streakSweep 12s linear infinite;
      mix-blend-mode: screen;
      will-change: transform, opacity;
    }

    .road {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 126px;
      z-index: 4;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 35%),
        linear-gradient(180deg, #504347 0%, #232328 100%);
      box-shadow: inset 0 18px 20px rgba(255, 237, 210, 0.03);
    }

    .road::before {
      content: "";
      position: absolute;
      left: -10%;
      bottom: 44px;
      width: 120%;
      height: 5px;
      background-image: linear-gradient(90deg, transparent 0 6%, rgba(233, 175, 103, 0.92) 6% 12%, transparent 12% 18%);
      background-size: 180px 100%;
      animation: laneMove 1.55s linear infinite;
      opacity: 0.9;
      will-change: transform;
    }

    .road::after {
      content: "";
      position: absolute;
      inset: auto -12% 10px;
      height: 42px;
      background:
        radial-gradient(ellipse at 12% 50%, rgba(255, 235, 201, 0.08), transparent 42%),
        radial-gradient(ellipse at 42% 50%, rgba(255, 235, 201, 0.08), transparent 40%),
        radial-gradient(ellipse at 72% 50%, rgba(255, 235, 201, 0.07), transparent 38%),
        linear-gradient(90deg, transparent, rgba(243, 232, 211, 0.18), transparent);
      animation: roadShimmer 2.8s linear infinite;
      will-change: transform, opacity;
    }

    .car-wrap {
      position: absolute;
      bottom: 44px;
      left: -320px;
      width: 340px;
      z-index: 5;
      animation: driveIn 7.6s cubic-bezier(0.34, 0.08, 0.18, 1) infinite;
      will-change: transform;
    }

    .car {
      position: relative;
      width: 100%;
      height: 156px;
      filter:
        drop-shadow(0 16px 20px rgba(0, 0, 0, 0.5))
        drop-shadow(0 4px 10px rgba(255, 220, 176, 0.04));
      will-change: transform;
    }

    .car svg {
      width: 100%;
      height: 100%;
      overflow: visible;
      animation: sedanBodyFloat 7.6s infinite;
      transform-origin: center bottom;
      will-change: transform;
    }

    .wheel {
      transform-box: fill-box;
      transform-origin: center;
      animation: wheelSpin 7.6s linear infinite;
      will-change: transform;
    }

    .boy {
      position: absolute;
      right: 42px;
      top: 4px;
      width: 72px;
      height: 80px;
      animation: bounce 1.8s ease-in-out infinite;
    }

    .boy-head {
      position: absolute;
      top: 0;
      right: 13px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #ffc791;
      box-shadow: inset -4px -3px 0 rgba(0, 0, 0, 0.08);
    }

    .boy-hair {
      position: absolute;
      top: -1px;
      right: 9px;
      width: 32px;
      height: 14px;
      border-radius: 14px 14px 8px 8px;
      background: #0f1620;
    }

    .boy-body {
      position: absolute;
      top: 23px;
      right: 5px;
      width: 42px;
      height: 32px;
      border-radius: 12px 12px 10px 10px;
      background: linear-gradient(180deg, #5fc0ff, #1a74d0);
    }

    .boy-arm {
      position: absolute;
      top: 31px;
      right: -1px;
      width: 20px;
      height: 8px;
      border-radius: 999px;
      transform-origin: left center;
      background: #ffc791;
      animation: wave 1.4s ease-in-out infinite;
    }

    .boy-arm::after {
      content: "";
      position: absolute;
      right: -4px;
      top: -1px;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #ffc791;
    }

    .boy-leg {
      position: absolute;
      top: 51px;
      width: 10px;
      height: 24px;
      border-radius: 999px;
      background: #1a2740;
    }

    .boy-leg.left {
      right: 24px;
    }

    .boy-leg.right {
      right: 10px;
    }

    .message-beam {
      position: absolute;
      left: 20px;
      top: -34px;
      z-index: 6;
      background: rgba(57, 38, 28, 0.9);
      border: 1px solid rgba(206, 187, 150, 0.24);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      animation: bubbleFloat 3.8s cubic-bezier(0.22, 1, 0.36, 1) infinite;
      backdrop-filter: blur(10px);
      white-space: nowrap;
      will-change: transform, opacity;
      box-shadow:
        0 14px 28px rgba(0, 0, 0, 0.2),
        inset 0 1px 0 rgba(255, 234, 206, 0.06);
    }

    .message-beam::after {
      content: "";
      position: absolute;
      left: 22px;
      bottom: -8px;
      width: 14px;
      height: 14px;
      transform: rotate(45deg);
      background: rgba(57, 38, 28, 0.9);
      border-right: 1px solid rgba(206, 187, 150, 0.24);
      border-bottom: 1px solid rgba(206, 187, 150, 0.24);
    }

    .smoke {
      position: absolute;
      left: -42px;
      bottom: 22px;
      width: 126px;
      height: 26px;
      background: radial-gradient(circle, rgba(222, 234, 245, 0.45) 0 18%, transparent 19%) 0 10px / 24px 24px repeat-x;
      filter: blur(4px);
      opacity: 0.45;
      animation: smokeTrail 2.4s ease-out infinite;
      will-change: transform, opacity;
    }

    .headlight {
      position: absolute;
      right: -24px;
      bottom: 54px;
      width: 108px;
      height: 40px;
      background: linear-gradient(90deg, rgba(255, 227, 179, 0.74), rgba(255, 227, 179, 0));
      clip-path: polygon(0 50%, 100% 0, 100% 100%);
      filter: blur(2px);
      opacity: 0.88;
      animation: headlightPulse 2.2s ease-in-out infinite;
      transform-origin: left center;
      will-change: transform, opacity;
    }

    .headlight::before,
    .headlight::after {
      content: "";
      position: absolute;
      inset: 0;
      background: inherit;
      clip-path: inherit;
    }

    .headlight::before {
      filter: blur(10px);
      opacity: 0.5;
      transform: scaleX(1.18) scaleY(1.6);
      transform-origin: left center;
    }

    .headlight::after {
      filter: blur(20px);
      opacity: 0.22;
      transform: scaleX(1.5) scaleY(2.1);
      transform-origin: left center;
    }

    .section-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
      margin-top: 26px;
    }

    .panel {
      padding: 24px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 1.5rem;
      letter-spacing: 0.03em;
    }

    .panel p {
      margin: 0;
      line-height: 1.8;
      color: var(--muted);
    }

    .timeline {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 70px 1fr;
      gap: 14px;
      align-items: start;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .timeline-item strong {
      color: var(--accent-warm);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: 0.85rem;
    }

    .timeline-item span {
      display: block;
      color: var(--text);
      line-height: 1.55;
    }

    .gallery {
      margin-top: 26px;
      padding: 28px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: calc(var(--radius) + 4px);
      box-shadow: var(--shadow);
    }

    .gallery-header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .gallery-header h2 {
      margin: 0;
      font-size: clamp(1.5rem, 3vw, 2rem);
    }

    .gallery-header p {
      margin: 8px 0 0;
      color: var(--muted);
      max-width: 52ch;
      line-height: 1.7;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .photo-card {
      position: relative;
      min-height: 220px;
      padding: 18px;
      border-radius: 24px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(4, 14, 26, 0.08), rgba(4, 14, 26, 0.65)),
        linear-gradient(135deg, rgba(201, 177, 138, 0.2), rgba(108, 111, 119, 0.14));
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: end;
    }

    .photo-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 25% 20%, rgba(255, 255, 255, 0.28), transparent 18%),
        radial-gradient(circle at 75% 15%, rgba(255, 255, 255, 0.18), transparent 16%),
        linear-gradient(160deg, rgba(255, 255, 255, 0.02), transparent 40%);
      mix-blend-mode: screen;
    }

    .photo-tag {
      position: relative;
      z-index: 1;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(7, 18, 31, 0.78);
      border: 1px solid rgba(206, 187, 150, 0.18);
      font-size: 0.95rem;
      color: var(--text);
    }

    .footer-note {
      text-align: center;
      padding: 28px 16px 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.8;
      letter-spacing: 0.01em;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.12);
    }

    .footer-note strong {
      color: var(--accent-strong);
    }

    @keyframes cloudDrift {
      from {
        transform: translate3d(-6px, 0, 0);
      }
      to {
        transform: translate3d(10px, 6px, 0);
      }
    }

    @keyframes sceneDrift {
      0% {
        transform: translate3d(0, 0, 0);
      }
      100% {
        transform: translate3d(0, -3px, 0);
      }
    }

    @keyframes skyShift {
      0% {
        transform: translate3d(-8px, 0, 0) scale(1);
        opacity: 0.62;
      }
      100% {
        transform: translate3d(12px, -4px, 0) scale(1.03);
        opacity: 0.92;
      }
    }

    @keyframes sunPulse {
      0%, 100% {
        transform: translate3d(0, 0, 0) scale(1);
        opacity: 0.96;
      }
      50% {
        transform: translate3d(0, 2px, 0) scale(1.03);
        opacity: 1;
      }
    }

    @keyframes glowShift {
      0% {
        transform: translate3d(-6px, 0, 0) scale(1);
        opacity: 0.9;
      }
      100% {
        transform: translate3d(8px, -4px, 0) scale(1.06);
        opacity: 1;
      }
    }

    @keyframes horizonBreath {
      0%, 100% {
        transform: translate3d(0, 0, 0) scaleX(1);
        opacity: 0.86;
      }
      50% {
        transform: translate3d(0, 2px, 0) scaleX(1.04);
        opacity: 1;
      }
    }

    @keyframes hillDrift {
      from {
        transform: translate3d(-8px, 0, 0);
      }
      to {
        transform: translate3d(10px, 0, 0);
      }
    }

    @keyframes skylineBackParallax {
      from {
        transform: translate3d(-10px, 0, 0);
      }
      to {
        transform: translate3d(12px, 0, 0);
      }
    }

    @keyframes skylineFarParallax {
      from {
        transform: translate3d(-6px, 0, 0);
      }
      to {
        transform: translate3d(8px, 0, 0);
      }
    }

    @keyframes skylineFrontParallax {
      from {
        transform: translate3d(-16px, 0, 0);
      }
      to {
        transform: translate3d(14px, 0, 0);
      }
    }

    @keyframes bokehFloat {
      0% {
        transform: translate3d(0, 0, 0);
        opacity: 0.45;
      }
      50% {
        transform: translate3d(-10px, -10px, 0);
        opacity: 0.72;
      }
      100% {
        transform: translate3d(8px, -18px, 0);
        opacity: 0.4;
      }
    }

    @keyframes hazeDrift {
      0% {
        transform: translate3d(-8px, 0, 0);
        opacity: 0.78;
      }
      100% {
        transform: translate3d(10px, -4px, 0);
        opacity: 0.96;
      }
    }

    @keyframes buildingSweepBack {
      0% {
        transform: translate3d(-24%, 0, 0);
      }
      100% {
        transform: translate3d(28%, 0, 0);
      }
    }

    @keyframes buildingSweepFront {
      0% {
        transform: translate3d(-18%, 0, 0);
      }
      100% {
        transform: translate3d(24%, 0, 0);
      }
    }

    @keyframes streakSweep {
      0% {
        transform: translate3d(-10%, 0, 0);
        opacity: 0.18;
      }
      50% {
        opacity: 0.46;
      }
      100% {
        transform: translate3d(12%, 0, 0);
        opacity: 0.16;
      }
    }

    @keyframes windowFlicker {
      0%, 100% {
        opacity: 0.52;
      }
      25% {
        opacity: 0.68;
      }
      55% {
        opacity: 0.44;
      }
      80% {
        opacity: 0.74;
      }
    }

    @keyframes windowFlickerSoft {
      0%, 100% {
        opacity: 0.4;
      }
      35% {
        opacity: 0.54;
      }
      70% {
        opacity: 0.34;
      }
    }

    @keyframes driveIn {
      0% {
        transform: translate3d(0, 2px, 0);
      }
      10% {
        transform: translate3d(36px, 2px, 0);
      }
      28% {
        transform: translate3d(214px, -1px, 0);
      }
      48% {
        transform: translate3d(396px, -3px, 0);
      }
      62% {
        transform: translate3d(434px, 0, 0);
      }
      78% {
        transform: translate3d(434px, 0, 0);
      }
      100% {
        transform: translate3d(760px, 1px, 0);
      }
    }

    @keyframes laneMove {
      from {
        transform: translate3d(0, 0, 0);
      }
      to {
        transform: translate3d(-180px, 0, 0);
      }
    }

    @keyframes roadShimmer {
      from {
        transform: translate3d(0, 0, 0);
        opacity: 0.42;
      }
      to {
        transform: translate3d(-90px, 0, 0);
        opacity: 0.18;
      }
    }

    @keyframes sedanBodyFloat {
      0%, 100% {
        transform: translate3d(0, 0, 0);
      }
      14% {
        transform: translate3d(0, -1px, 0);
      }
      36% {
        transform: translate3d(0, -3px, 0);
      }
      62% {
        transform: translate3d(0, -1px, 0);
      }
      78% {
        transform: translate3d(0, 0, 0);
      }
    }

    @keyframes wheelSpin {
      0% {
        transform: rotate(0deg);
      }
      10% {
        transform: rotate(40deg);
      }
      28% {
        transform: rotate(300deg);
      }
      48% {
        transform: rotate(660deg);
      }
      62% {
        transform: rotate(760deg);
      }
      78% {
        transform: rotate(760deg);
      }
      100% {
        transform: rotate(1160deg);
      }
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-4px);
      }
    }

    @keyframes wave {
      0%, 100% {
        transform: rotate(-10deg);
      }
      50% {
        transform: rotate(24deg);
      }
    }

    @keyframes smokeTrail {
      0% {
        transform: translate3d(0, 0, 0) scale(0.9);
        opacity: 0.28;
      }
      50% {
        transform: translate3d(-14px, -4px, 0) scale(1);
        opacity: 0.18;
      }
      100% {
        transform: translate3d(-26px, -10px, 0) scale(1.08);
        opacity: 0;
      }
    }

    @keyframes bubbleFloat {
      0%, 100% {
        transform: translate3d(0, 4px, 0);
        opacity: 0.86;
        box-shadow: 0 0 0 rgba(180, 139, 96, 0);
      }
      20% {
        transform: translate3d(0, 0, 0);
        opacity: 1;
      }
      55% {
        transform: translate3d(0, -5px, 0);
        opacity: 1;
        box-shadow: 0 10px 24px rgba(180, 139, 96, 0.18);
      }
      78% {
        transform: translate3d(0, -8px, 0);
        opacity: 0.9;
      }
    }

    @keyframes headlightPulse {
      0%, 100% {
        transform: translate3d(0, 0, 0) scaleX(1);
        opacity: 0.76;
      }
      50% {
        transform: translate3d(0, 0, 0) scaleX(1.08);
        opacity: 0.95;
      }
    }

    @media (hover: hover) and (pointer: fine) {
      .hero:hover {
        box-shadow:
          0 28px 72px rgba(0, 0, 0, 0.46),
          0 0 0 1px rgba(255, 241, 214, 0.03) inset,
          0 -24px 48px rgba(255, 201, 138, 0.05) inset;
      }

      .scene-card:hover {
        transform: translateY(-2px);
        box-shadow:
          0 22px 52px rgba(0, 0, 0, 0.34),
          0 2px 0 rgba(255, 235, 203, 0.05) inset,
          inset 0 0 0 1px rgba(255, 255, 255, 0.03);
      }

      .hero-photo-card:hover {
        transform: translateY(-2px);
        box-shadow:
          0 22px 42px rgba(0, 0, 0, 0.34),
          0 2px 0 rgba(255, 235, 203, 0.06) inset,
          inset 0 0 0 1px rgba(255, 255, 255, 0.03);
      }

      .wish-box:hover {
        transform: translateY(-1px);
        box-shadow:
          inset 0 0 0 1px rgba(255, 226, 188, 0.06),
          inset 0 14px 24px rgba(255, 236, 209, 0.02),
          0 18px 32px rgba(0, 0, 0, 0.2);
      }

      .badge:hover {
        transform: translateY(-1px);
        box-shadow:
          0 14px 24px rgba(184, 109, 77, 0.28),
          inset 0 1px 0 rgba(255, 247, 230, 0.42);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .road-scene::before,
      .road-scene::after,
      .sun,
      .sky-glow,
      .sky-shift,
      .sunset-clouds,
      .horizon-glow,
      .distant-hills,
      .atmospheric-haze,
      .cityline-far,
      .cityline-back,
      .cityline,
      .building-detail,
      .light-streaks,
      .road::before,
      .road::after,
      .car-wrap,
      .car svg,
      .wheel,
      .message-beam,
      .smoke,
      .headlight {
        animation: none !important;
      }
    }

    @media (max-width: 920px) {
      .hero-grid,
      .section-grid,
      .gallery-grid {
        grid-template-columns: 1fr;
      }

      .hero {
        padding: 22px;
      }

      .gallery-header {
        align-items: start;
        flex-direction: column;
      }

      .road-scene {
        min-height: 330px;
      }

      .title-row {
        grid-template-columns: minmax(0, 1fr) 180px;
      }
    }

    @media (max-width: 640px) {
      .page-shell {
        width: min(calc(100% - 20px), var(--max));
        padding-top: 14px;
      }

      .hero,
      .panel,
      .gallery {
        padding: 18px;
        border-radius: 22px;
      }

      .eyebrow,
      .chip {
        font-size: 0.78rem;
      }

      .wish-box {
        padding: 16px;
      }

      .wish-box p,
      .lead {
        font-size: 0.96rem;
      }

      .title-row {
        grid-template-columns: 1fr;
      }

      .hero-photo-card {
        width: min(100%, 220px);
        min-height: 0;
      }

      .scene-card {
        padding: 12px;
      }

      .road-scene {
        min-height: 290px;
      }

      .car-wrap {
        width: 300px;
        left: -290px;
        bottom: 40px;
        transform: scale(0.9);
        transform-origin: left bottom;
      }

      .timeline-item {
        grid-template-columns: 1fr;
      }

      .photo-card {
        min-height: 180px;
      }

      .message-beam {
        font-size: 0.78rem;
        left: 8px;
      }

    }
  </style>
</head>

  <main class="page-shell">
    <section class="hero">
      <div class="hero-grid">
        <div class="hero-copy">
          <div class="title-row">
            <h1>
              Happy Birthday
              <span class="name-accent">Arju</span>
            </h1>

            <div class="hero-photo-card" aria-label="Photo of Arju">
              <img src="arju-jpg.jpg" alt="Photo of Arju">
            </div>
          </div>

          <div class="wish-box">
            <p>
              "Happy birthday mama. Truly glad to have you in my corner.
              Cheers to another year of crushing it"
            </p>
          </div>

            <div class="atmospheric-haze"></div>
            <div class="distant-hills"></div>
            <div class="horizon-glow"></div>

            <div class="building-detail mid"></div>
            <div class="building-detail near"></div>
            <div class="light-streaks"></div>

            <div class="car-wrap">
              <div class="message-beam">lets move on to another year</div>

              <div class="car">
                <div class="smoke"></div>
                <div class="headlight"></div>

                  <svg viewBox="0 0 420 190" role="img" aria-label="Mercedes style sedan labeled Hadi">
                    <defs>
                      <linearGradient id="bodyPaint" x1="0%" y1="0%" x2="100%" y2="100%">

                        <stop offset="45%" stop-color="#b86d4d"></stop>
                        <stop offset="100%" stop-color="#533f4d"></stop>
                      </linearGradient>
                      <linearGradient id="bodyGloss" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="rgba(255,255,255,0.0)"></stop>
                        <stop offset="12%" stop-color="rgba(255,244,224,0.14)"></stop>

                      </linearGradient>

                        <stop offset="0%" stop-color="#fff0d9" stop-opacity="0.92"></stop>
                        <stop offset="100%" stop-color="#d2ad88" stop-opacity="0.46"></stop>
                      </linearGradient>
                      <linearGradient id="rim" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#f6e4c9"></stop>
                        <stop offset="100%" stop-color="#9e8474"></stop>
                      </linearGradient>
                      <linearGradient id="chrome" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#fff1d5"></stop>
                        <stop offset="50%" stop-color="#d7b58b"></stop>
                        <stop offset="100%" stop-color="#8d6d62"></stop>
                      </linearGradient>
                    </defs>

                    <ellipse cx="215" cy="154" rx="132" ry="14" fill="rgba(0, 0, 0, 0.15)"></ellipse>
                    <ellipse cx="128" cy="154" rx="41" ry="10" fill="rgba(0, 0, 0, 0.34)"></ellipse>
